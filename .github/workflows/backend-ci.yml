name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

defaults:
  run:
    working-directory: backend

jobs:
  test:
    name: Lint & Test (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: '1'
      PYTHONDONTWRITEBYTECODE: '1'
      APP_ENV: test
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      SECRET_KEY: ci-test-secret-key-not-for-production-32chars
      API_KEY_ENCRYPTION_KEY: ''
      ACCESS_TOKEN_EXPIRE_MINUTES: '60'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest-cov

      - name: Lint with ruff
        run: ruff check app/ tests/ --output-format=github
        continue-on-error: true

      - name: Verify import sanity
        run: |
          python -c "from app.main import app; print('FastAPI app loaded:', app.title)"
          python -c "from app.api.v1.router import api_router; print('Router loaded, routes:', len(api_router.routes))"

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-report=html \
            -ra --tb=short
        continue-on-error: true

      - name: Enforce coverage threshold (80%)
        run: |
          pytest tests/ --cov=app --cov-fail-under=80 -q --tb=short
        continue-on-error: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 14

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/TEST_REPORT.md
          if-no-files-found: ignore
          retention-days: 14

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: precision-drug-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
